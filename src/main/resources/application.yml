spring:
  threads:
    virtual:
      enabled: false  # Set to false for platform thread baseline (Milestone 5)

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true  # Access at http://localhost:8080/h2-console

  jpa:
    hibernate:
      ddl-auto: none  # We manage schema ourselves via schema.sql
    show-sql: false
    open-in-view: false  # Disable the warning, and it's bad practice anyway

  sql:
    init:
      mode: always  # Run schema.sql + data.sql on every startup